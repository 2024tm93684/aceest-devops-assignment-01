name: ACEest CI/CD Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: flake8 app.py --max-line-length=120 --ignore=E501

  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v3
      - run: docker build -t aceest-fitness:${{ github.sha }} .
      - run: docker tag aceest-fitness:${{ github.sha }} aceest-fitness:latest

  test:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v3
      - run: docker build -t aceest-fitness:test .
      - run: docker run aceest-fitness:test pytest test_app.py -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=80
